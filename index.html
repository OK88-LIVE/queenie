<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OK88 Singapore Landing Page</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    padding:20px;

    background:
    radial-gradient(circle at top left, rgba(255,255,255,0.12), transparent 25%),
    radial-gradient(circle at bottom right, rgba(0,140,255,0.18), transparent 30%),
    linear-gradient(135deg,#020b18 0%,#0B3D91 50%,#020814 100%);

    overflow-x:hidden;
    overflow-y:auto;

    color:white;
}

/* background effect */

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    repeating-linear-gradient(
    -45deg,
    rgba(255,255,255,0.015),
    rgba(255,255,255,0.015) 2px,
    transparent 2px,
    transparent 30px
    );

    pointer-events:none;
}

/* card */

.container{
    width:100%;
    max-width:520px;
}

.card{
    position:relative;
    overflow:hidden;

    border-radius:35px;

    padding:35px 28px;

    background:rgba(3,12,28,0.78);

    border:1px solid rgba(255,255,255,0.15);

    backdrop-filter:blur(14px);

    box-shadow:
    0 25px 80px rgba(0,0,0,0.55),
    inset 0 0 35px rgba(11,61,145,0.3);

    margin-bottom:30px;
}

/* animated glow */

.card::before{
    content:"";

    position:absolute;
    inset:-2px;

    background:
    linear-gradient(
    120deg,
    transparent,
    rgba(120,180,255,0.18),
    transparent
    );

    animation:shine 5s linear infinite;
}

@keyframes shine{
    0%{
        transform:translateX(-100%);
    }

    100%{
        transform:translateX(100%);
    }
}

.content{
    position:relative;
    z-index:2;
}

/* LOGO */

.logo{
    width:220px;

    margin:0 auto 22px;
}

.logo img{
    width:100%;
    display:block;
}

/* TAG */

.tag{
    width:fit-content;

    margin:0 auto 18px;

    padding:10px 18px;

    border-radius:999px;

    border:1px solid rgba(70,140,255,0.45);

    background:
    linear-gradient(
    135deg,
    rgba(0,80,255,0.18),
    rgba(255,255,255,0.05)
    );

    box-shadow:
    0 0 20px rgba(11,61,145,0.35);

    font-size:14px;
    font-weight:700;

    text-align:center;
}

/* TITLE */

h1{
    text-align:center;

    font-size:38px;

    line-height:1.15;

    margin-bottom:18px;

    font-weight:900;
}

.highlight{
    color:white;

    text-shadow:
    0 0 15px rgba(255,255,255,0.28);
}

.desc{
    text-align:center;

    font-size:17px;
    line-height:1.7;

    color:rgba(255,255,255,0.78);

    margin-bottom:28px;
}

/* BANNER */

.banner{
    display:block;

    width:100%;

    overflow:hidden;

    border-radius:28px;

    margin-bottom:20px;

    border:1px solid rgba(120,180,255,0.3);

    transition:0.3s ease;
}

.banner:hover{
    transform:translateY(-3px);

    box-shadow:
    0 15px 35px rgba(11,61,145,0.4);
}

.banner img{
    width:100%;
    display:block;
}

/* BUTTON */

.country-list{
    margin-top:10px;
}

.btn{
    width:100%;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:20px 20px;

    border-radius:26px;

    text-decoration:none;
    color:white;

    background:
    linear-gradient(
    135deg,
    rgba(255,255,255,0.05),
    rgba(11,61,145,0.26)
    );

    border:1px solid rgba(120,180,255,0.2);

    transition:0.25s ease;
}

.btn:hover{
    transform:translateY(-2px);

    background:
    linear-gradient(
    135deg,
    rgba(255,255,255,0.12),
    rgba(11,61,145,0.4)
    );

    box-shadow:
    0 12px 25px rgba(11,61,145,0.35);
}

.btn-left{
    display:flex;
    align-items:center;
    justify-content:center;

    width:100%;

    gap:16px;

    font-size:22px;
    font-weight:800;

    text-align:center;
}

.flag{
    width:58px;
    height:58px;

    border-radius:50%;

    object-fit:cover;

    border:2px solid rgba(255,255,255,0.2);
}

/* SUPPORT */

.support{
    margin-top:22px;

    display:grid;
    grid-template-columns:1fr 1fr;

    gap:14px;
}

.support a{
    text-decoration:none;

    text-align:center;

    padding:18px;

    border-radius:20px;

    font-size:18px;
    font-weight:800;

    transition:0.25s ease;
}

.support a:hover{
    transform:translateY(-2px);
}

.whatsapp{
    background:
    linear-gradient(
    135deg,
    #004cff,
    #1b7cff
    );

    color:white;
}

.telegram{
    background:
    linear-gradient(
    135deg,
    white,
    #dce8ff
    );

    color:#0B3D91;
}

/* FOOTER */

.footer{
    margin-top:24px;

    text-align:center;

    font-size:14px;

    color:rgba(255,255,255,0.6);

    line-height:1.8;
}

@media(max-width:540px){

    h1{
        font-size:32px;
    }

    .btn-left{
        font-size:18px;
    }

    .logo{
        width:180px;
    }

}

</style>
</head>
